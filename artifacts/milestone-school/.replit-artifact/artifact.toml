kind = "web"
previewPath = "/"
title = "The Milestone Sr. Sec. School"
version = "1.0.0"
id = "artifacts/milestone-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23923

[services.development]
run = "pnpm --filter @workspace/milestone-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milestone-school", "run", "build" ]
publicDir = "artifacts/milestone-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23923"
BASE_PATH = "/"
